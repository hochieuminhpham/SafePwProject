<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Safe Safe - Account</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-container {
            background-color: #fff;
            border: 2px solid #333;
            width: 100%;
            max-width: 400px;
            padding: 30px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .form-header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .form-header h2 {
            margin: 0;
            font-size: 1.4em;
            color: #111;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
            gap: 5px;
        }

        .form-group label {
            font-weight: bold;
            font-size: 0.95em;
        }

        .form-group input {
            padding: 8px;
            border: 2px solid #333;
            font-family: inherit;
            font-size: 1em;
        }

        .form-group input:focus {
            outline: none;
            border-color: #0056b3;
        }

        .btn-submit {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: 2px solid #000;
            background-color: #fff;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .btn-submit:hover {
            background-color: #e9e9e9;
        }

        .btn-cancel {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            background-color: transparent;
            color: #555;
            text-decoration: underline;
            font-size: 0.9em;
            cursor: pointer;
        }

    </style>
</head>
<body>

<div class="form-container">
    <div class="form-header">
        <h2 id="form-title">Add Account</h2>
    </div>

    <form id="account-form">
        <div class="form-group">
            <label for="path">Website/Application</label>
            <input type="text" id="path" name="path" required />
        </div>

        <div class="form-group">
            <label for="username">Username / Email</label>
            <input type="text" id="username" name="username" required />
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required />
        </div>

        <button type="submit" id="btn-submit" class="btn-submit">Save</button>
        <button type="button" class="btn-cancel" onclick="window.location.href='/'">Cancel</button>
    </form>
</div>

<script th:src="@{/account-form.js}"></script>
</body>
</html>
